<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SiyaClip 🚀 | AI Video Shorts Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #09090b; color: #fafafa; scroll-behavior: smooth; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .glass-dark { background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .gradient-text { background: linear-gradient(135deg, #818cf8 0%, #c084fc 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .btn-primary { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); transition: transform 0.2s; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 20px -10px #6366f1; }
        .sidebar-item:hover { background: rgba(255, 255, 255, 0.05); }
        [x-cloak] { display: none !important; }
        
        @keyframes scan {
            0% { transform: translateY(-100%); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(100%); opacity: 0; }
        }
        .scanner { animation: scan 2s linear infinite; }
    </style>
</head>
<body x-data="siyaEngine()" x-init="initApp()">

    <div x-show="showAuthModal" x-cloak class="fixed inset-0 z-[100] flex items-center justify-center p-4">
        <div @click="showAuthModal = false" class="absolute inset-0 bg-black/80 backdrop-blur-sm"></div>
        <div class="glass-dark w-full max-w-md rounded-3xl p-8 relative overflow-hidden" @click.stop>
            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-indigo-500 to-purple-500"></div>
            <div class="text-center mb-8">
                <h2 class="text-3xl font-bold mb-2" x-text="authMode === 'login' ? 'Welcome Back' : 'Create Account'"></h2>
                <p class="text-zinc-400 text-sm">Access your viral AI engine</p>
            </div>
            <form @submit.prevent="handleAuth" class="space-y-4">
                <template x-if="authMode === 'signup'">
                    <input type="text" x-model="formData.name" required class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 outline-none focus:border-indigo-500 transition" placeholder="Full Name">
                </template>
                <input type="email" x-model="formData.email" required class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 outline-none focus:border-indigo-500 transition" placeholder="Email Address">
                <input type="password" x-model="formData.password" required class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 outline-none focus:border-indigo-500 transition" placeholder="Password">
                <template x-if="errorMessage"><p class="text-red-400 text-xs bg-red-400/10 p-3 rounded-lg" x-text="errorMessage"></p></template>
                <button type="submit" class="w-full btn-primary py-4 rounded-xl font-bold mt-4 shadow-xl" x-text="authMode === 'login' ? 'Sign In' : 'Create Free Account'"></button>
            </form>
            <div class="mt-6 text-center text-sm text-zinc-500">
                <button @click="toggleMode" class="text-indigo-400 font-bold hover:underline" x-text="authMode === 'login' ? 'Need an account? Sign Up' : 'Already have an account? Login'"></button>
            </div>
        </div>
    </div>

    <nav class="fixed w-full z-50 glass border-b border-white/10 px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-2 cursor-pointer" @click="page = 'home'">
            <span class="text-2xl font-bold tracking-tighter">SiyaClip <span class="text-indigo-500">🚀</span></span>
        </div>
        <div class="flex gap-4">
            <template x-if="!isLoggedIn">
                <div class="flex gap-4 items-center">
                    <button @click="openAuth('login')" class="text-sm font-medium hover:text-indigo-400 transition">Login</button>
                    <button @click="openAuth('signup')" class="btn-primary px-5 py-2 rounded-full text-sm font-bold">Sign Up</button>
                </div>
            </template>
            <template x-if="isLoggedIn">
                <div class="flex gap-3">
                    <div class="hidden sm:flex flex-col items-end justify-center px-3 border-r border-white/10">
                        <span class="text-[10px] uppercase text-zinc-500 font-bold tracking-widest">Credits</span>
                        <span class="text-sm font-bold text-indigo-400" x-text="user.credits"></span>
                    </div>
                    <button @click="page = 'dashboard'" class="text-sm font-medium bg-white/10 px-4 py-2 rounded-lg border border-white/10 hover:bg-white/20">Dashboard</button>
                </div>
            </template>
        </div>
    </nav>

    <main class="pt-24">
        <section x-show="page === 'home'" x-transition.opacity>
            <div class="max-w-6xl mx-auto px-6 py-20 text-center">
                <span class="inline-block px-4 py-1.5 mb-6 text-xs font-semibold tracking-widest uppercase bg-indigo-500/10 text-indigo-400 border border-indigo-500/20 rounded-full">Automated Clipping Engine</span>
                <h1 class="text-5xl md:text-7xl font-bold mb-8 leading-tight">Your YouTube Channel <br><span class="gradient-text">On Autopilot.</span></h1>
                <p class="text-zinc-400 text-lg md:text-xl max-w-2xl mx-auto mb-10">Paste a YouTube link and watch our AI identify high-retention segments to create 9:16 viral shorts instantly.</p>
                <button @click="isLoggedIn ? page = 'dashboard' : openAuth('signup')" class="btn-primary px-10 py-5 rounded-2xl text-xl font-bold">Try SiyaClip Now</button>
            </div>
        </section>

        <section x-show="page === 'dashboard'" x-cloak class="flex min-h-[90vh]">
            <aside class="w-64 border-r border-white/10 p-6 hidden lg:block">
                <nav class="space-y-2">
                    <button class="w-full flex items-center gap-3 p-3 rounded-lg bg-indigo-500/10 text-indigo-400 font-medium"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg> Dashboard</button>
                    <button @click="logout" class="w-full flex items-center gap-3 p-3 rounded-lg text-red-400 hover:bg-red-400/5 transition mt-auto"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg> Logout</button>
                </nav>
            </aside>

            <div class="flex-1 p-6 md:p-10 max-w-6xl mx-auto w-full">
                <div class="glass p-8 rounded-3xl mb-12 relative overflow-hidden">
                    <h2 class="text-2xl font-bold mb-6">Create New AI Shorts</h2>
                    <div class="flex flex-col md:flex-row gap-4">
                        <input type="text" x-model="ytLink" placeholder="Paste YouTube link (Watch, Short, or Mobile)..." class="flex-1 bg-white/5 border border-white/10 rounded-2xl px-6 py-4 outline-none focus:border-indigo-500 transition">
                        <button @click="generateShorts" :disabled="isGenerating" class="btn-primary px-8 py-4 rounded-2xl font-bold disabled:opacity-50">
                            <span x-show="!isGenerating">Extract Shorts</span>
                            <span x-show="isGenerating">AI Analyzing...</span>
                        </button>
                    </div>
                    
                    <div x-show="isGenerating" class="absolute inset-0 bg-black/60 backdrop-blur-md flex flex-col items-center justify-center z-10">
                        <div class="w-64 h-2 bg-white/10 rounded-full overflow-hidden mb-4 relative">
                            <div class="h-full bg-indigo-500 transition-all duration-100" :style="`width: ${progress}%`"></div>
                            <div class="absolute inset-0 scanner bg-gradient-to-r from-transparent via-white/30 to-transparent w-20"></div>
                        </div>
                        <p class="text-indigo-400 font-mono text-sm tracking-widest uppercase animate-pulse">Deep Scanning Video Data... <span x-text="progress"></span>%</p>
                    </div>
                </div>

                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-xl font-bold">Generated Library</h3>
                    <span class="text-sm text-zinc-500" x-text="`${history.length} Clips Found`"></span>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <template x-for="(short, index) in history" :key="index">
                        <div class="group glass rounded-2xl overflow-hidden border border-white/5 hover:border-indigo-500/30 transition-all duration-500">
                            <div class="aspect-[9/16] relative bg-zinc-900">
                                <img :src="short.thumb" class="w-full h-full object-cover opacity-60 group-hover:opacity-100 transition-opacity">
                                <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-black/20 to-transparent"></div>
                                <div class="absolute bottom-4 left-4 right-4">
                                    <p class="font-bold text-sm leading-tight mb-1" x-text="short.title"></p>
                                    <div class="flex justify-between items-center">
                                        <div class="flex flex-col">
                                            <span class="text-[10px] text-indigo-400 font-bold uppercase" x-text="short.type"></span>
                                            <span class="text-xs text-zinc-400" x-text="short.duration"></span>
                                        </div>
                                        <button class="bg-white/10 hover:bg-indigo-500 p-2 rounded-lg transition"><svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"></path></svg></button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </template>
                    
                    <template x-if="history.length === 0 && !isGenerating">
                        <div class="col-span-full py-20 text-center border-2 border-dashed border-white/5 rounded-3xl">
                            <p class="text-zinc-500">Your library is empty. Paste a link above.</p>
                        </div>
                    </template>
                </div>
            </div>
        </section>
    </main>

    <script>
        function siyaEngine() {
            return {
                page: 'home',
                isLoggedIn: false,
                showAuthModal: false,
                authMode: 'login',
                errorMessage: '',
                isGenerating: false,
                progress: 0,
                ytLink: '',
                user: { name: '', email: '', credits: 3 },
                formData: { name: '', email: '', password: '' },
                history: [],

                initApp() {
                    const session = localStorage.getItem('siya_session');
                    if (session) {
                        this.user = JSON.parse(session);
                        this.isLoggedIn = true;
                        this.page = 'dashboard';
                        this.loadHistory();
                    }
                },

                loadHistory() {
                    const saved = localStorage.getItem(`history_${this.user.email}`);
                    this.history = saved ? JSON.parse(saved) : [];
                },

                openAuth(mode) {
                    this.authMode = mode;
                    this.showAuthModal = true;
                    this.errorMessage = '';
                },

                handleAuth() {
                    const users = JSON.parse(localStorage.getItem('siya_users') || '[]');
                    if (this.authMode === 'signup') {
                        if (users.find(u => u.email === this.formData.email)) return this.errorMessage = "Email already in use.";
                        const newUser = { ...this.formData, credits: 3 };
                        users.push(newUser);
                        localStorage.setItem('siya_users', JSON.stringify(users));
                        this.loginUser(newUser);
                    } else {
                        const user = users.find(u => u.email === this.formData.email && u.password === this.formData.password);
                        user ? this.loginUser(user) : this.errorMessage = "Invalid Credentials";
                    }
                },

                loginUser(u) {
                    this.user = { name: u.name, email: u.email, credits: u.credits };
                    localStorage.setItem('siya_session', JSON.stringify(this.user));
                    this.isLoggedIn = true;
                    this.showAuthModal = false;
                    this.page = 'dashboard';
                    this.loadHistory();
                },

                getYoutubeId(url) {
                    const regExp = /^.*((youtu.be\/)|(v\/)|(\/u\/\w\/)|(embed\/)|(watch\?))\??v?=?([^#&?]*).*/;
                    const match = url.match(regExp);
                    return (match && match[7].length == 11) ? match[7] : false;
                },

                generateShorts() {
                    const videoId = this.getYoutubeId(this.ytLink);
                    if (!videoId) return alert("Please provide a valid YouTube URL (Watch or Shorts).");
                    if (this.user.credits <= 0) return alert("Insufficient credits! Please upgrade your plan.");

                    this.isGenerating = true;
                    this.progress = 0;
                    
                    let interval = setInterval(() => {
                        this.progress += 2;
                        if (this.progress >= 100) {
                            clearInterval(interval);
                            this.completeGeneration(videoId);
                        }
                    }, 50);
                },

                completeGeneration(id) {
                    // Extracting high quality thumb from real YouTube ID
                    const thumbUrl = `https://img.youtube.com/vi/${id}/maxresdefault.jpg`;
                    
                    const newShorts = [
                        { title: `Viral Segment A: ${id}`, duration: "0:42s", thumb: thumbUrl, type: "AI Highlight" },
                        { title: `Viral Segment B: ${id}`, duration: "0:59s", thumb: thumbUrl, type: "Retention Max" },
                        { title: `Viral Segment C: ${id}`, duration: "0:31s", thumb: thumbUrl, type: "Hook Master" }
                    ];

                    this.history = [...newShorts, ...this.history];
                    localStorage.setItem(`history_${this.user.email}`, JSON.stringify(this.history));
                    
                    this.user.credits--;
                    localStorage.setItem('siya_session', JSON.stringify(this.user));
                    
                    const users = JSON.parse(localStorage.getItem('siya_users'));
                    const idx = users.findIndex(u => u.email === this.user.email);
                    users[idx].credits = this.user.credits;
                    localStorage.setItem('siya_users', JSON.stringify(users));

                    this.isGenerating = false;
                    this.ytLink = '';
                },

                logout() {
                    localStorage.removeItem('siya_session');
                    location.reload();
                },

                toggleMode() {
                    this.authMode = this.authMode === 'login' ? 'signup' : 'login';
                    this.errorMessage = '';
                }
            }
        }
    </script>
</body>
</html>
