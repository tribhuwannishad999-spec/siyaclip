<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SiyaClip 🚀</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Inter',sans-serif;
background:#030303;
color:#fff;
overflow-x:hidden;
}

body:before{
content:"";
position:fixed;
inset:0;
background:
radial-gradient(circle at top left,#00eaff35,transparent 30%),
radial-gradient(circle at bottom right,#ff00c835,transparent 30%),
linear-gradient(135deg,#030303,#07131a,#030303);
z-index:-1;
}

.wrap{
max-width:430px;
margin:auto;
padding:18px;
}

.logo{
font-size:34px;
font-weight:900;
margin-bottom:18px;
}

.logo span{
background:linear-gradient(90deg,#00eaff,#00ff88);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.card{
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.08);
padding:24px;
border-radius:28px;
backdrop-filter:blur(10px);
}

h1{
font-size:42px;
line-height:1.05;
font-weight:900;
margin-bottom:12px;
}

h1 span{
color:#00eaff;
}

.sub{
font-size:15px;
color:#cfcfcf;
line-height:1.7;
margin-bottom:18px;
}

.input{
width:100%;
padding:16px;
border:none;
outline:none;
border-radius:18px;
background:#0a0a0a;
color:#fff;
font-size:15px;
margin-bottom:14px;
}

.btn{
width:100%;
padding:16px;
border:none;
border-radius:18px;
font-size:20px;
font-weight:900;
cursor:pointer;
background:linear-gradient(90deg,#00eaff,#00ff88);
color:#000;
margin-bottom:18px;
}

.result{
margin-top:10px;
}

.thumb{
width:100%;
border-radius:18px;
margin-bottom:14px;
}

.success{
background:#08291b;
padding:14px;
border-radius:14px;
color:#7dffbc;
font-weight:800;
margin-bottom:14px;
}

.file{
background:rgba(255,255,255,.05);
padding:14px;
border-radius:16px;
margin-bottom:10px;
display:flex;
justify-content:space-between;
align-items:center;
gap:10px;
}

.download{
border:none;
padding:10px 14px;
border-radius:12px;
font-weight:800;
cursor:pointer;
background:#fff;
color:#000;
}

.plan{
margin-top:16px;
padding:18px;
border-radius:22px;
background:rgba(255,255,255,.05);
}

.footer{
text-align:center;
font-size:12px;
color:#aaa;
padding:18px 0;
}
</style>
</head>

<body>

<div class="wrap">

<div class="logo">Siya<span>Clip</span> 🚀</div>

<div class="card">

<h1>Create <span>Viral Shorts</span></h1>

<div class="sub">
Paste your YouTube link and generate ready-to-post shorts with captions & HD export.
</div>

<input type="text" class="input" placeholder="Paste YouTube Link Here">

<button class="btn" onclick="generateShorts()">Generate 3 Shorts</button>

<div class="result" id="result"></div>

</div>

<div class="plan">
<h2>₹49 Pro Lite</h2>
<p>30 Shorts / Month • Faster Speed • HD Export</p>
</div>

<div class="plan">
<h2>₹99 Pro Max</h2>
<p>Unlimited Shorts • Fastest Speed • Priority Access</p>
</div>

<div class="footer">
© 2026 SiyaClip • Built For Creators
</div>

</div>

<script>
async function generateShorts(){

const input = document.querySelector(".input");
const url = input.value.trim();

if(url === ""){
alert("Paste YouTube link first");
return;
}

const btn = document.querySelector(".btn");
const result = document.getElementById("result");

btn.innerText = "Processing...";
btn.disabled = true;

result.innerHTML = `
<div style="color:#00eaff;font-weight:700;padding:10px 0;">
⏳ Processing Video...
</div>
`;

try{

const res = await fetch("https://siyaclip.onrender.com/generate",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({url:url})
});

const data = await res.json();

if(data.success){

result.innerHTML = `
<img src="${data.thumbnail}" class="thumb">

<div class="success">
✅ Video Detected & Shorts Ready
</div>

<div style="font-size:18px;font-weight:800;margin-bottom:10px;color:#00ffd5;">
${data.title}
</div>

<div style="font-size:13px;color:#aaa;margin-bottom:14px;">
Video ID: ${data.videoId}
</div>

<div class="file">
<span>🎬 ${data.shorts[0]}</span>
<button class="download">Download</button>
</div>

<div class="file">
<span>🎬 ${data.shorts[1]}</span>
<button class="download">Download</button>
</div>

<div class="file">
<span>🎬 ${data.shorts[2]}</span>
<button class="download">Download</button>
</div>
`;

}else{

result.innerHTML = `
<div style="color:red;padding-top:12px;">
${data.message}
</div>
`;

}

}catch(error){

result.innerHTML = `
<div style="color:red;padding-top:12px;">
Server Error
</div>
`;

}

btn.innerText = "Generate 3 Shorts";
btn.disabled = false;

}
</script>

</body>
</html>
